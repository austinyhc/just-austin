baseURL = 'https://austinyhc.github.io/just-austin/'
languageCode = 'en-us'
title = 'Austin'
theme = 'PaperMod'

[params]
  defaultTheme = "auto"
  showShareButtons = false
  showCodeCopyButtons = true

  [params.profileMode]
    enabled = true
    title = "Austin: Abstraction, Aperture, Apron"
    subtitle = """
Hi, I’m Austin.

By day, I am a software engineer and systems architect specializing in industrial automation, edge computing, and cloud-native energy analytics. By night, I balance the digital world with tangible crafts.

This blog is a collection of my core pursuits, built around four pillars: Austin (my personal journey), Algorithms (low-level C++ engineering and robust data pipelines), Aperture (bringing photography and ESG sustainability insights into focus), and Apron (the grounding ritual of cooking and food).

Welcome to my space where logic meets life.
"""
    imageUrl = "profile.jpg"
    imageWidth = 150
    imageHeight = 150
    buttons = [
      { name = "Algorithms", url = "/just-austin/algorithms/" },
      { name = "Aperture", url = "/just-austin/aperture/" },
      { name = "Apron", url = "/just-austin/apron/" },
      { name = "Austin", url = "/just-austin/austin/" }
    ]

  [params.homeInfoParams]
    Title = "Austin: Abstraction, Aperture, Apron"
    Content = "I am Austin; A System Software Engineer by passion. Data Science Practitioner at heart. Avid reader. Essentialist. Nerd. Newbie Rustacean. Virgo. ♍"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/austinyhc"
  [[params.socialIcons]]
    name = "x"
    url = "https://twitter.com/austinyht"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/austinyhc/"

